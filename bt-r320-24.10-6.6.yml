name: Build bt-r320 ImmortalWrt 24.10-6.6

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: bt-r320.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: build.sh
  RELEASE_FILE: bt-r320-24.10-6.6.md
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      repo_url: ${{ env.REPO_URL }}
      repo_branch: ${{ env.REPO_BRANCH }}
      feeds_conf: ${{ env.FEEDS_CONF }}
      config_file: ${{ env.CONFIG_FILE }}
      diy_p1_sh: ${{ env.DIY_P1_SH }}
      diy_p2_sh: ${{ env.DIY_P2_SH }}
      release_file: ${{ env.RELEASE_FILE }}
      upload_bin_dir: ${{ env.UPLOAD_BIN_DIR }}
      upload_firmware: ${{ env.UPLOAD_FIRMWARE }}
      upload_release: ${{ env.UPLOAD_RELEASE }}
      tz: ${{ env.TZ }}

    steps:
      - name: Output environment
        run: |
          echo "Repository: ${{ env.REPO_URL }}"
          echo "Branch: ${{ env.REPO_BRANCH }}"
          echo "Config: ${{ env.CONFIG_FILE }}"
          echo "Build time: $(date -u '+%Y-%m-%d %H:%M UTC')"

  call-builder:
    needs: setup
    uses: EasongChung/Actions-immortalwrt-bt-r320-24.10-237/.github/workflows/image-builder.yml@main
    with:
      repo_url: ${{ needs.setup.outputs.repo_url }}
      repo_branch: ${{ needs.setup.outputs.repo_branch }}
      feeds_conf: ${{ needs.setup.outputs.feeds_conf }}
      config_file: ${{ needs.setup.outputs.config_file }}
      diy_p1_sh: ${{ needs.setup.outputs.diy_p1_sh }}
      diy_p2_sh: ${{ needs.setup.outputs.diy_p2_sh }}
      release_file: ${{ needs.setup.outputs.release_file }}
      upload_bin_dir: ${{ needs.setup.outputs.upload_bin_dir == 'true' }}
      upload_firmware: ${{ needs.setup.outputs.upload_firmware == 'true' }}
      upload_release: ${{ needs.setup.outputs.upload_release == 'true' }}
      tz: ${{ needs.setup.outputs.tz }}

  update-cache:
    runs-on: ubuntu-latest
    needs: call-builder
    if: ${{ github.actor != 'github-actions[bot]' }}
    steps:
      - name: Force update repo hash cache
        uses: actions/cache@v3
        with:
          path: .repo-hash
          key: repo-hash_${{ github.workflow }}_${{ needs.call-builder.outputs.repo_hash }}
          lookup-only: true
